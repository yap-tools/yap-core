name: release

# Every version tag gets a GitHub Release carrying two prebuilt npm tarballs
# under constant asset names: yap-cli.tgz (the manager-only CLI, zero
# dependencies — what the install one-liner downloads) and yap-core.tgz (the
# full server — what `yap init` vendors into each instance). No TypeScript
# toolchain ever runs on an operator's machine.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm pack
      - run: mv yap-core-*.tgz yap-core.tgz
      - run: npm run pack:cli
      - run: gh release create "$GITHUB_REF_NAME" yap-cli.tgz yap-core.tgz --title "Yap $GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
