name: release

# Every version tag gets a GitHub Release carrying the prebuilt npm tarball
# under the constant asset name yap-core.tgz. That asset is what both the
# global-CLI install one-liner and `yap init`'s server vendoring download —
# no TypeScript toolchain ever runs on an operator's machine.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm pack
      - run: mv yap-core-*.tgz yap-core.tgz
      - run: gh release create "$GITHUB_REF_NAME" yap-core.tgz --title "Yap $GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
