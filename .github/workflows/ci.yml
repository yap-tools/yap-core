name: ci

on:
  push:
    branches: [main, v1]
  pull_request:

jobs:
  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: yap
          POSTGRES_PASSWORD: yap
          POSTGRES_DB: yap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yap"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      YAP_TEST_PG_URL: postgres://yap:yap@localhost:5432/yap_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
